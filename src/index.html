<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <title>Owari</title>
  </head>
  <body>
    <header class="side-menu">
      <div class="logo">Owari</div>
      <nav>
        <ul class="nav-list">
          <li class="nav-item active default" data-filter="all">
            <div class="list">
              <p class="list-title">All</p>
            </div>
            <span class="list-count count-all-todos" data-list="all"></span>
          </li>
        </ul>
        <button
          class="btn-create-list"
          command="show-modal"
          commandfor="dialog-create-list"
        >
          <span>+</span>
          Create new list
        </button>
      </nav>
    </header>
    <main id="main-content">
      <div class="intro-container">
        <div class="intro-content">
          <h2 class="intro-welcome"></h2>
          <h3 class="intro-date"></h3>
        </div>
        <button class="btn-select-date">Today</button>
      </div>
      <ul class="task-list" id="main-task-list"></ul>
      <button
        class="btn-create-task"
        command="show-modal"
        commandfor="dialog-create-task"
      >
        <span>+</span>
        Create a new task
      </button>
      <dialog id="dialog-create-task">
        <form class="form-task" method="dialog">
          <h2>New Task</h2>
          <div class="field" id="field-task">
            <label for="task">Task</label>
            <input
              type="text"
              name="taskDescription"
              id="task"
              minlength="1"
              maxlength="72"
              required
            />
          </div>
          <div class="field" id="field-date">
            <label for="date">Date</label>
            <input
              type="date"
              name="date"
              id="date"
              min="2026-01-01"
              max="2126-12-31"
              required
            />
          </div>
          <div class="field" id="field-list">
            <label for="list">List</label>
            <select name="taskList" id="list" required>
              <option value="">Please choose a list</option>
            </select>
          </div>
          <div id="field-priority">
            <p class="priority-label">Priority</p>
            <div class="priority-options">
              <label
                class="priority-option priority-option-low"
                data-priority="low"
              >
                <input type="radio" name="priority" value="low" />

                <div class="btn-priority-content">
                  <img
                    class="priority-icon priority-icon-low"
                    src=""
                    alt="priority-icon-low"
                  />
                  <span class="priority-tag">Low</span>
                </div>
              </label>
              <label
                class="priority-option priority-option-medium"
                data-priority="medium"
              >
                <input type="radio" name="priority" value="medium" />

                <div class="btn-priority-content">
                  <img
                    class="priority-icon priority-icon-medium"
                    src=""
                    alt="priority-icon-medium"
                  />
                  <span class="priority-tag">Medium</span>
                </div>
              </label>
              <label
                class="priority-option priority-option-high"
                data-priority="high"
              >
                <input type="radio" name="priority" value="high" />

                <div class="btn-priority-content">
                  <img
                    class="priority-icon priority-icon-high"
                    src=""
                    alt="priority-icon-high"
                  />
                  <span class="priority-tag">High</span>
                </div>
              </label>
            </div>
          </div>
          <div class="form-task-controls">
            <button
              class="form-task-close"
              type="button"
              commandfor="dialog-create-task"
              command="close"
            >
              Close
            </button>
            <button class="form-task-save" type="submit">Save</button>
          </div>
        </form>
      </dialog>

      <dialog id="dialog-create-list">
        <form class="form-list" method="dialog">
          <h2>New List</h2>
          <div class="field" id="field-listTitle">
            <label for="listTitle">List Name</label>
            <input
              type="text"
              name="listTitle"
              id="listTitle"
              minlength="1"
              maxlength="20"
            />
          </div>
          <div class="field" id="field-iconColor">
            <label for="iconColor">Icon Color</label>
            <input
              type="color"
              id="iconColor"
              name="iconColor"
              value="#e66465"
            />
          </div>
          <div class="form-list-controls">
            <button
              class="form-list-close"
              type="button"
              commandfor="dialog-create-list"
              command="close"
            >
              Close
            </button>
            <button class="form-list-save" type="submit">Save</button>
          </div>
        </form>
      </dialog>
      <dialog id="dialog-edit-task">
        <form class="form-edit-task" method="dialog">
          <h2>Edit Task</h2>
          <div class="field" id="field-task">
            <label for="edit-task">Task</label>
            <input type="text" name="taskDescription" id="edit-task" required />
          </div>
          <div class="field" id="field-date">
            <label for="edit-date">Date</label>
            <input type="date" name="date" id="edit-date" />
          </div>
          <div class="field" id="field-list">
            <label for="edit-list">List</label>
            <select name="taskList" id="edit-list" required>
              <option value="">Please choose a list</option>
            </select>
          </div>
          <div id="field-priority">
            <p class="priority-label">Priority</p>
            <div class="priority-options">
              <label
                class="priority-option priority-option-low"
                data-priority="low"
              >
                <input
                  type="radio"
                  name="priority"
                  value="low"
                  id="edit-low-input"
                />

                <div class="btn-priority-content">
                  <img
                    class="priority-icon priority-icon-low"
                    src=""
                    alt="priority-icon-low"
                  />
                  <span class="priority-tag">Low</span>
                </div>
              </label>
              <label
                class="priority-option priority-option-medium"
                data-priority="medium"
              >
                <input
                  type="radio"
                  name="priority"
                  value="medium"
                  id="edit-medium-input"
                />

                <div class="btn-priority-content">
                  <img
                    class="priority-icon priority-icon-medium"
                    src=""
                    alt="priority-icon-medium"
                  />
                  <span class="priority-tag">Medium</span>
                </div>
              </label>
              <label
                class="priority-option priority-option-high"
                data-priority="high"
              >
                <input
                  type="radio"
                  name="priority"
                  value="high"
                  id="edit-high-input"
                />

                <div class="btn-priority-content">
                  <img
                    class="priority-icon priority-icon-high"
                    src=""
                    alt="priority-icon-high"
                  />
                  <span class="priority-tag">High</span>
                </div>
              </label>
            </div>
          </div>
          <input
            type="hidden"
            id="hidden-form-todo-id"
            name="hiddenFormTodoId"
          />
          <input
            type="hidden"
            id="hidden-form-todo-assigned-list"
            name="hiddenFormTodoAssignedList"
          />
          <div class="form-edit-task-controls">
            <button
              class="form-edit-task-close"
              type="button"
              commandfor="dialog-edit-task"
              command="close"
            >
              Close
            </button>
            <button class="form-edit-task-save" type="submit">Save</button>
          </div>
        </form>
      </dialog>
    </main>
  </body>
</html>
